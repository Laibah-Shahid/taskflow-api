server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — any unknown path goes to index.html so Angular router can handle it
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively; Angular's filenames are hashed
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html — always fetch fresh so new builds are picked up
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}