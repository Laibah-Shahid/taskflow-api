<form [formGroup]="form" (ngSubmit)="onSubmit()" class="task-form" novalidate>
    <h3>{{ isEditing ? 'Edit task' : 'New task' }}</h3>
  
    <div class="form-field">
      <label for="title">Title *</label>
      <input
        id="title"
        type="text"
        formControlName="title"
        maxlength="200"
        [class.invalid]="form.controls.title.invalid && form.controls.title.touched"
      />
      @if (form.controls.title.invalid && form.controls.title.touched) {
        <small class="field-error">
          @if (form.controls.title.hasError('required')) {
            Title is required.
          } @else if (form.controls.title.hasError('maxlength')) {
            Title must be 200 characters or fewer.
          }
        </small>
      }
    </div>
  
    <div class="form-field">
      <label for="description">Description</label>
      <textarea
        id="description"
        formControlName="description"
        rows="3"
      ></textarea>
    </div>
  
    <div class="form-row">
      <div class="form-field">
        <label for="status">Status</label>
        <select id="status" formControlName="status">
          @for (s of statuses; track s) {
            <option [value]="s">{{ s }}</option>
          }
        </select>
      </div>
  
      <div class="form-field">
        <label for="priority">Priority</label>
        <select id="priority" formControlName="priority">
          @for (p of priorities; track p) {
            <option [value]="p">{{ p }}</option>
          }
        </select>
      </div>
  
      <div class="form-field">
        <label for="dueDate">Due date</label>
        <input id="dueDate" type="date" formControlName="dueDate" />
      </div>
    </div>
  
    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="onCancel()" [disabled]="saving()">
        Cancel
      </button>
      <button type="submit" class="btn-primary" [disabled]="saving()">
        {{ saving() ? 'Saving...' : (isEditing ? 'Update task' : 'Create task') }}
      </button>
    </div>
  </form>
